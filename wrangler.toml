name = "veille-dashboard"
main = ".output/server/index.mjs"
compatibility_date = "2025-07-15"
compatibility_flags = ["nodejs_compat"]

# Assets statiques (Workers Assets) produits par le preset Nitro cloudflare_module.
# Servis en priorité ; toute requête non matchée retombe sur le Worker (SSR).
[assets]
directory = ".output/public"

# Base D1 dédiée à l'authentification (Better Auth).
# En dev, nitro-cloudflare-dev émule ce binding via une SQLite locale (.wrangler/).
[[d1_databases]]
binding = "DB_AUTH"
database_name = "veille-auth"
database_id = "d2a669ab-dc04-4242-9493-e0af5fc275b9"
migrations_dir = "migrations"
