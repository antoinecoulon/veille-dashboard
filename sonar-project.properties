# Configuration SonarCloud (compétence C19 — analyse de qualité de code).
# Analyse déclenchée par le job `sonar` de .github/workflows/ci.yml. Choix tracé en ADR D17
# (dépôt veille-analytics/docs/002-decisions-architecturales.md).
#
# organization / projectKey doivent correspondre à ce que SonarCloud a créé en liant le dépôt
# (convention SonarCloud : <organization>_<repo>). Valeurs par défaut d'après le compte GitHub
# antoinecoulon — à ajuster si SonarCloud en a généré d'autres.
sonar.organization=antoinecoulon
sonar.projectKey=antoinecoulon_veille-dashboard
sonar.projectName=veille-dashboard

# Code applicatif : le front Nuxt (app/) et le serveur Nitro / BFF (server/).
sonar.sources=app,server

# Hors périmètre : sorties de build Nuxt, dépendances, assets, migrations SQL, scripts,
# état local wrangler. Aucun n'est du code applicatif à analyser.
sonar.exclusions=.nuxt/**,.output/**,dist/**,node_modules/**,public/**,migrations/**,scripts/**,.wrangler/**

# Pas de tests automatisés dans ce dépôt (validation par typecheck/lint + vérifs manuelles) :
# aucune couverture à remonter. Assumé et cohérent avec la matrice de couverture.
