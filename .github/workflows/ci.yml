name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint

      # Tests du BFF et du contrat inter-dépôts. `pnpm test` enchaîne un contrôle de types sur
      # tsconfig.test.json puis vitest : `nuxt typecheck` ci-dessus ne regarde pas `test/`, et
      # la liaison de type qui garde le contrat /api/stats/health ne serait pas compilée sans
      # cette passe. Cf. ADR D18 — le défaut qui a motivé cette suite était invisible pour
      # typecheck et lint réunis.
      - run: pnpm test

  # Analyse de sécurité (C18). Voir le même job dans veille-analytics : `pnpm audit`
  # couvre les dépendances installées, gitleaks le code et son historique. Aucun des
  # deux ne juge la logique applicative.
  #
  # Le scan dynamique (OWASP ZAP) vit dans un workflow séparé, security-scan.yml : sa
  # cible est l'application DÉPLOYÉE, pas le code de la branche, donc il n'a rien à
  # faire dans un pipeline déclenché par une pull request.
  security:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 — gitleaks analyse tout l'historique. Un secret retiré dans un
      # commit ultérieur reste exposé dans les objets git.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Au 2026-07-21, l'audit initial remontait 8 avis dont un CRITIQUE (tar, chaîne de
      # build de nitropack). Tous relevaient de dépendances transitives de construction ;
      # aucune n'est servie au navigateur. Ils ont été résolus par des `pnpm.overrides`
      # versionnés dans package.json plutôt qu'ignorés — cf. ADR D14.
      - run: pnpm audit --audit-level=high

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Analyse de qualité de code (C19). SonarCloud : bugs, code smells, duplication et
  # quality gate persistante, sur le front Nuxt (app/) et le serveur Nitro (server/).
  # Job séparé, non bloquant (aucun `deploy` ici — Cloudflare Workers Builds déploie sur
  # push). Même config que veille-analytics ; choix tracé en ADR D17 (dépôt analytics).
  #
  # Prérequis : compte SonarCloud lié au dépôt + secret `SONAR_TOKEN`. Tant qu'il est
  # absent, le job échoue — voulu : il n'a de sens qu'une fois SonarCloud connecté.
  sonar:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 — SonarCloud date le « new code » à partir de l'historique complet.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Épinglée au SHA complet plutôt qu'au tag mobile `v5` : un tag peut être redéplacé,
      # un SHA est immuable — durcissement de la chaîne d'appro CI.
      - uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
